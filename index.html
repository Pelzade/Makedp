<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Profile Picture Composer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="main-layout">
  <!-- LEFT AD (desktop) -->
  <div class="ad-column" id="adLeft">
    <span>📢 Ad Space</span>
    <span style="margin-top: 6px; font-size:12px; opacity:0.7;">Your banner here</span>
  </div>

  <!-- main composer -->
  <div class="container">
    <h2 style="margin-top: 0; margin-bottom: 20px; font-weight: 500; font-size: 1.6rem;">Branded Display Picture</h2>

    <div class="controls">
      <div class="field">
        <label for="overlayInput">Upload Frame (PNG Only)</label>
        <input type="file" id="overlayInput" accept="image/png" />
      </div>
      <div class="field">
        <label for="dpInput">Upload Your Display Picture</label>
        <input type="file" id="dpInput" accept="image/*" />
      </div>
      <div class="field slider-field">
        <label for="scaleSlider">Scale DP</label>
        <input type="range" id="scaleSlider" min="0.5" max="2" step="0.01" value="1" />
      </div>
      <p style="font-size: 13px; color: #6c757d; margin: 8px auto 0 auto; line-height: 1.4; text-align: center; width: 100%; display: block;">
  👆 Pinch and hold your picture to move into position. While scrolling on the page, do so outside of the canvas area 😊
</p>
    </div>

    <div class="canvas-wrapper">
      <canvas id="canvas" width="1000" height="1000"></canvas>
    </div>

    <div class="actions">
      <button id="downloadBtn">Download</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <!-- RIGHT AD (desktop) -->
  <div class="ad-column" id="adRight">
    <span>📢 Ad Space</span>
    <span style="margin-top: 6px; font-size:12px; opacity:0.7;">Your banner here</span>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
