<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Profile Picture Composer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="main-layout">
  <!-- LEFT AD (desktop) -->
  <div class="ad-column" id="adLeft">
  <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:10px;">
    <a href="https://vidiq.com/pelz" target="_blank" style="display:block; width:100%; height:100%;">
      <img src="https://drive.usercontent.google.com/download?id=1KOQXRqdo1rLu_oKWIELKsIh7dkzlV5MZ&export=download&confirm=t" alt="vidiq.com/pelz" style="width:100%; height:100%; object-fit:contain; display:block;" />
    </a>
  </div>
</div>

  <!-- main composer -->
  <div class="container">
    <h2 style="margin-top: 0; margin-bottom: 20px; font-weight: 500; font-size: 1.6rem;">Branded Profile</h2>

    <div class="controls">
      <div class="field">
        <label for="overlayInput" style="font-size: 16px;">Upload Frame (Square Format &amp; PNG Only)</label>
        <input type="file" id="overlayInput" accept="image/png" />
      </div>
      <div class="field">
        <label for="dpInput">Upload Your Display Picture</label>
        <input type="file" id="dpInput" accept="image/*" />
      </div>
      <div class="field slider-field">
        <label for="scaleSlider">Scale DP</label>
        <input type="range" id="scaleSlider" min="0.5" max="2" step="0.01" value="1" />
        <p style="font-size: 13px; color: #6c757d; margin: 8px auto 0 auto; line-height: 1.4; text-align: center; width: 100%; display: block;">
          👆 Pinch and hold image to move into position. While scrolling on the page, do so outside of the canvas area 😊
        </p>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="canvas" width="1000" height="1000"></canvas>
    </div>

    <div class="actions">
      <button id="downloadBtn">Download</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <!-- RIGHT AD (desktop) -->
  <div class="ad-column" id="adRight">
  <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:10px;">
    <a href="https://vidiq.com/pelz" target="_blank" style="display:block; width:100%; height:100%;">
      <img src="https://drive.usercontent.google.com/download?id=1KOQXRqdo1rLu_oKWIELKsIh7dkzlV5MZ&export=download&confirm=t" alt="vidiq.com/pelz" style="width:100%; height:100%; object-fit:contain; display:block;" />
    </a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
