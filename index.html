  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Picture Composer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h2>Create Your Branded Profile Picture</h2>

    <div class="controls">
      <div class="field">
        <label for="overlayInput">Upload Frame (PNG Only)</label>
        <input type="file" id="overlayInput" accept="image/png" />
      </div>

      <div class="field">
        <label for="dpInput">Upload Your Display Picture (JPG, PNG, etc.)</label>
        <input type="file" id="dpInput" accept="image/*" />
      </div>

      <div class="field slider-field">
        <label for="scaleSlider">Scale DP</label>
        <input type="range" id="scaleSlider" min="0.5" max="2" step="0.01" value="1" />
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="canvas" width="1000" height="1000"></canvas>
    </div>

    <div class="actions">
      <button id="downloadBtn">Download</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
